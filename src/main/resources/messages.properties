# Текст, используемый при вызове команд
command.start=👤 Приветствую, мой новый друг, я бот-планировщик! 🤖\n\nСо мной вы можете создавать заметки, отмечать их важными и устанавливать напоминания, чтобы ни за что не пропустить!\n\n👇 Нажмите на кнопку, чтобы начать работу.

# Текст, используемый на экранах
menu.header=☀️ Доброго времени суток!\n\n👇 Чтобы начать, выберите одну из категорий ниже:

task.new.title=🖋️ Введите *тему* новой заметки.\n\nСоветую сделать её короткой и понятной.
task.new.description=📝 Введите подробное *описание* вашей заметки.
task.new.deadline=📅 Введите *дату и время*, когда вы хотите, чтобы я напомнил о ней.\n\n Поддерживаемые форматы:\n12.01.2026 12:34\n12.01.2026
task.new.important=Желаете ли вы отметить её *важной*?
task.new.success=✅ Всё сделано!\n\nВы можете просмотреть вашу новую заметку в *"Мои заметки"*.

# Текст кнопок
button.menu=Главное меню

button.task.new=Новая заметка
button.task.new.description.skip=Пропустить описание задачи
button.task.new.deadline.skip=Пропустить напоминание
button.task.new.important.yes=Да
button.task.new.important.no=Нет
button.task.cancel=Отменить добавление задачи

