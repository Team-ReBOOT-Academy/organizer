task.new.description=📝 Введите подробное *описание* вашей заметки.
task.new.deadline=📅 Введите *дату и время*, когда вы хотите, чтобы я напомнил о ней.\n\n Поддерживаемые форматы:\n12.01.2026 12:34\n12.01.2026
task.new.important=Желаете ли вы отметить её *важной*?
task.new.success=✅ Всё сделано!\n\nВы можете просмотреть вашу новую заметку в *"Мои заметки"*.

task.list.categories=🔎 Выберите категорию заметок, которую хотите посмотреть.

task.list.category.important.empty=Список важных заметок пока пуст
task.list.category.important.header=📌 В данном разделе вы можете посмотреть наиболее важные для вас заметки.\nНи в коем случае не забудьте о них!\n\nCтраница {0}/{1}
task.list.category.completed.empty=Список выполненных задач пока пуст
task.list.category.completed.header=📌 В данном разделе вы можете посмотреть все ваши выполненные заметки. Гордитесь своей продуктивностью!\n\nСтраница {0}/{1}
task.list.category.others.empty=Список других задач пока пуст
task.list.category.others.header=📌 В данном разделе представлены ваши заметки средней степени важности. Но это не значит, что про них можно забывать, хорошо? Я слежу за вами!\nСтраница {0}/{1}

