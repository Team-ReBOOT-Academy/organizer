# Текст, используемый при вызове команд
command.start=👤 Приветствую, мой новый друг, я бот-планировщик! 🤖\n\nСо мной вы можете создавать заметки, отмечать их важными и устанавливать напоминания, чтобы ни за что не пропустить!\n\n👇 Нажмите на кнопку, чтобы начать работу.

# Текст, используемый на экранах
menu.header=☀️ Доброго времени суток!\n\n👇 Чтобы начать, выберите одну из категорий ниже:

